apis:
  - aid: defer:defer-platform
    name: Defer Platform
    description: >-
      The Defer platform exposes a TypeScript SDK for declaring deferred
      functions and a managed control plane that schedules, queues,
      retries, and observes their execution. Functions are defined with
      decorators such as defer() and defer.cron() and invoked from
      application code; the platform handled queuing, scaling, and
      observability transparently.
