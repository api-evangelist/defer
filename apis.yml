aid: defer
name: Defer
description: >-
  Defer was a TypeScript-first background job and workflow automation
  platform for Node.js applications that let developers schedule, queue,
  and orchestrate serverless functions with built-in retries, throttling,
  concurrency controls, and scheduled (CRON) execution. Defer integrated
  with frameworks such as Next.js, Remix, and SvelteKit through an SDK
  and a managed control plane. The defer.run service has since
  transitioned and the defer.run domain currently redirects to
  digger.tools; this entry preserves the historical profile and links to
  the surviving documentation, GitHub organization, and references.
